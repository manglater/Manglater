<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin - Manglater</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Manrope', sans-serif;
      background: #15181c;
      color: #f3efe6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .page-wrap {
      width: 100%;
      max-width: 1200px;
      padding: 40px 28px;
    }
    .login-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
    }
    .login-brand {
      font-family: 'Oswald', sans-serif;
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #e8a33d;
      margin-bottom: 6px;
      line-height: 1;
    }
    .login-brand small {
      display: block;
      font-family: 'Manrope', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      color: #a3927a;
      letter-spacing: 0.15em;
      margin-top: 10px;
    }
    .login-card {
      background: #1e2227;
      border: 1px solid rgba(243,239,230,0.10);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      margin-top: 36px;
      text-align: left;
    }
    .login-card label {
      display: block;
      font-size: 0.85rem;
      color: #a3927a;
      margin-bottom: 6px;
      margin-top: 16px;
    }
    .login-card label:first-child { margin-top: 0; }
    .login-card input {
      width: 100%;
      padding: 12px 14px;
      background: #15181c;
      border: 1px solid rgba(243,239,230,0.12);
      border-radius: 8px;
      color: #f3efe6;
      font-family: 'Manrope', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .login-card input:focus {
      border-color: #e8a33d;
    }
    .login-card button {
      width: 100%;
      margin-top: 24px;
      padding: 13px;
      background: linear-gradient(135deg, #d81e1e, #9c1717);
      color: #f3efe6;
      border: none;
      border-radius: 999px;
      font-family: 'Manrope', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: box-shadow 0.15s;
    }
    .login-card button:hover {
      box-shadow: 0 8px 22px rgba(216,30,30,0.32);
    }
    .status { padding: 12px 14px; margin: 16px 0 0; border-radius: 8px; font-size: 0.88rem; }
    .status.ok { background: rgba(92,138,95,0.12); border: 1px solid rgba(92,138,95,0.35); color: #8dd694; }
    .status.error { background: rgba(216,30,30,0.12); border: 1px solid rgba(216,30,30,0.35); color: #ff8b8b; }

    /* Admin panel */
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(243,239,230,0.10);
    }
    .admin-header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 1.8rem;
      font-weight: 600;
    }
    .admin-header h1 span { color: #e8a33d; }
    .admin-header h1 small {
      display: block;
      font-family: 'Manrope', sans-serif;
      font-size: 0.78rem;
      font-weight: 400;
      color: #a3927a;
      letter-spacing: 0.05em;
    }
    .top-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .action-btn {
      padding: 10px 18px;
      background: #1e2227;
      color: #f3efe6;
      border: 1px solid rgba(243,239,230,0.12);
      border-radius: 999px;
      cursor: pointer;
      font-family: 'Manrope', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      transition: border-color 0.15s;
    }
    .action-btn:hover { border-color: #a3927a; }
    .action-btn--danger:hover { border-color: #d81e1e; color: #ff8b8b; }

    h2 { font-family: 'Oswald', sans-serif; font-size: 1.4rem; font-weight: 600; margin-bottom: 18px; color: #e8a33d; }
    h3 { font-family: 'Oswald', sans-serif; font-size: 1.1rem; font-weight: 600; margin-bottom: 14px; color: #f3efe6; }

    .purchases {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .purchase-card {
      background: #1e2227;
      border: 1px solid rgba(243,239,230,0.10);
      border-radius: 16px;
      padding: 20px;
    }
    .purchase-card h3 { font-family: 'Oswald', sans-serif; font-size: 1.1rem; color: #e8a33d; margin: 0 0 12px; }
    .purchase-card p { margin: 4px 0; color: #a3927a; font-size: 0.85rem; }
    .purchase-card p strong { color: #f3efe6; }
    .purchase-card img {
      max-width: 100%; height: auto; margin: 12px 0; border-radius: 8px;
      border: 1px solid rgba(243,239,230,0.10);
    }
    .btn-confirm {
      display: block; width: 100%; margin-top: 14px;
      padding: 12px;
      background: linear-gradient(135deg, #5c8a5f, #3d6b40);
      color: white;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-family: 'Manrope', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      transition: box-shadow 0.15s;
    }
    .btn-confirm:hover { box-shadow: 0 6px 16px rgba(92,138,95,0.35); }
    .btn-confirm:disabled { background: #333; cursor: not-allowed; box-shadow: none; }

    .section-card {
      background: #1e2227;
      border: 1px solid rgba(243,239,230,0.10);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .section-card .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .section-card input {
      flex: 1;
      min-width: 200px;
      padding: 11px 14px;
      background: #15181c;
      border: 1px solid rgba(243,239,230,0.12);
      border-radius: 8px;
      color: #f3efe6;
      font-family: 'Manrope', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .section-card input:focus { border-color: #e8a33d; }
    .section-card .btn-action {
      padding: 11px 22px;
      background: #262b31;
      color: #f3efe6;
      border: 1px solid rgba(243,239,230,0.12);
      border-radius: 999px;
      cursor: pointer;
      font-family: 'Manrope', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      transition: border-color 0.15s;
      white-space: nowrap;
    }
    .section-card .btn-action:hover { border-color: #e8a33d; }
    .result-box {
      margin-top: 14px;
      padding: 14px;
      border-radius: 10px;
      background: rgba(243,239,230,0.03);
      border: 1px solid rgba(243,239,230,0.08);
      color: #f3efe6;
      font-size: 0.88rem;
    }
    .result-box p { margin: 4px 0; color: #a3927a; }
    .result-box p strong { color: #f3efe6; }
    .small { font-size: 0.78rem; color: #6f6353; margin-top: 8px; }
    .section-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    @media (max-width: 600px) {
      .page-wrap { padding: 20px 16px; }
      .login-card { padding: 24px; }
      .login-brand { font-size: 2.6rem; }
      .section-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page-wrap">

    <!-- LOGIN -->
    <div id="loginSection" class="login-section">
      <div class="login-brand">
        MANGLATER
        <small>Panel de Administración</small>
      </div>
      <div class="login-card">
        <label>Usuario</label>
        <input type="text" id="user" placeholder="Nombre de usuario" />
        <label>Contraseña</label>
        <input type="password" id="pass" placeholder="Contraseña" />
        <button onclick="login()">Iniciar Sesión</button>
        <div id="statusMsg"></div>
      </div>
    </div>

    <!-- ADMIN AREA -->
    <div id="adminArea" style="display:none">
      <div class="admin-header">
        <div>
          <h1>
            Panel <span>Manglater</span>
            <small>Sesión iniciada como <strong id="userDisplay" style="color:#e8a33d;">admin</strong></small>
          </h1>
        </div>
        <div class="top-actions">
          <button class="action-btn" onclick="loadPurchases()"><i class="fa-solid fa-rotate"></i> Refrescar</button>
          <button class="action-btn action-btn--danger" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</button>
        </div>
      </div>

      <!-- Pending purchases -->
      <h2><i class="fa-solid fa-clock"></i> Compras Pendientes</h2>
      <div id="purchases" class="purchases"></div>

      <!-- Tools grid -->
      <h2 style="margin-top:10px;"><i class="fa-solid fa-screwdriver-wrench"></i> Herramientas</h2>
      <div class="section-grid">
        <!-- Buscar por correo (existing) -->
        <section class="section-card">
          <h3><i class="fa-solid fa-envelope"></i> Ver compras por correo</h3>
          <div class="input-row">
            <input id="emailInput" placeholder="Correo del cliente" />
            <button class="btn-action" onclick="buscarPorCorreo()">Buscar</button>
          </div>
          <div id="emailResult"></div>
        </section>

        <!-- Buscar por número de ticket -->
        <section class="section-card">
          <h3><i class="fa-solid fa-ticket"></i> Buscar cliente por número de ticket</h3>
          <div class="input-row">
            <input id="ticketSearchInput" type="number" min="1" max="100000" placeholder="Ej: 00001" />
            <button class="btn-action" onclick="buscarPorTicket()">Buscar</button>
          </div>
          <div id="ticketSearchResult"></div>
        </section>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let token = null;

    function setStatus(message, type = 'ok') {
      const msg = document.getElementById('statusMsg');
      msg.innerHTML = `<div class="status ${type}">${message}</div>`;
    }

    async function login() {
      const user = document.getElementById('user').value.trim();
      const pass = document.getElementById('pass').value.trim();

      if (!user || !pass) {
        setStatus('❌ Ingresa usuario y contraseña', 'error');
        return;
      }

      try {
        const response = await fetch(`${API}/api/admin-login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass })
        });

        const data = await response.json();

        if (data.ok) {
          token = data.token;
          localStorage.setItem('token', token);
          localStorage.setItem('adminUser', user);
          document.getElementById('userDisplay').textContent = user;
          document.getElementById('adminArea').style.display = 'block';
          document.getElementById('loginSection').style.display = 'none';
          setStatus('✓ Login correcto', 'ok');
          loadPurchases();
        } else {
          setStatus('❌ ' + data.error, 'error');
        }
      } catch (e) {
        setStatus('❌ Error: ' + e.message, 'error');
      }
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('adminUser');
      token = null;
      document.getElementById('adminArea').style.display = 'none';
      document.getElementById('loginSection').style.display = 'flex';
      document.getElementById('statusMsg').innerHTML = '';
      document.getElementById('user').value = '';
      document.getElementById('pass').value = '';
    }

    async function loadPurchases() {
      try {
        const response = await fetch(`${API}/api/pending-purchases`);
        const data = await response.json();

        const container = document.getElementById('purchases');
        container.innerHTML = '';

        if (!data.ok) {
          container.innerHTML = `<p style="color:#a3927a;">Error: ${data.error || 'No se pudo cargar la información'}</p>`;
          return;
        }

        if (!data.purchases || data.purchases.length === 0) {
          container.innerHTML = '<p style="color:#a3927a;">No hay compras pendientes</p>';
          return;
        }

        data.purchases.forEach(p => {
          const img = p.comprobanteUrl
            ? `<img src="${API}${p.comprobanteUrl}" alt="Comprobante de ${p.nombre}" />`
            : '';

          const card = document.createElement('div');
          card.className = 'purchase-card';
          card.innerHTML = `
            <h3>${p.nombre}</h3>
            <p><strong>ID:</strong> ${p.id}</p>
            <p><strong>Cédula:</strong> ${p.cedula}</p>
            <p><strong>Teléfono:</strong> ${p.celular}</p>
            <p><strong>Email:</strong> ${p.email}</p>
            <p><strong>Ciudad:</strong> ${p.ciudad || 'No registrada'}</p>
            <p><strong>Cantidad:</strong> ${p.cantidad} números</p>
            <p><strong>Total:</strong> $${Number(p.total || 0).toLocaleString('es-CO')}</p>
            <p><strong>Modo:</strong> ${p.ticketMode === 'visual' ? 'Visual' : p.ticketMode === 'manual' ? 'Manual' : 'Automático'}</p>
            ${(p.ticketMode === 'manual' || p.ticketMode === 'visual') && p.manualNumbers && p.manualNumbers.length
              ? `<p><strong>Números solicitados:</strong> ${p.manualNumbers.map(n => String(n).padStart(5, '0')).join(', ')}</p>`
              : ''
            }
            ${img}
            <button class="btn-confirm" onclick="confirmarCompra('${p.id}')">✓ Confirmar Compra</button>
          `;
          container.appendChild(card);
        });
      } catch (e) {
        alert('Error al cargar compras: ' + e.message);
      }
    }

    async function confirmarCompra(purchaseId) {
      if (!token) {
        alert('No hay sesión activa');
        return;
      }

      if (!confirm('¿Confirmar esta compra y asignar boletas?')) return;

      try {
        const response = await fetch(`${API}/api/confirm-purchase`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-admin-token': token
          },
          body: JSON.stringify({ purchaseId })
        });

        const data = await response.json();

        if (data.ok) {
          alert('✓ Compra confirmada. Boletas: ' + data.boletas.map(n => String(n).padStart(5, '0')).join(', '));
          loadPurchases();
        } else {
          alert('❌ Error: ' + data.error);
        }
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    async function guardarCiudad(purchaseId) {
      const input = document.getElementById('ciudad-' + purchaseId);
      if (!input) return;
      const ciudad = input.value.trim();

      if (!token) {
        alert('No hay sesión activa');
        return;
      }

      try {
        const response = await fetch(`${API}/api/update-purchase-field`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-admin-token': token
          },
          body: JSON.stringify({ purchaseId, field: 'ciudad', value: ciudad })
        });

        const data = await response.json();
        if (data.ok) {
          input.style.borderColor = '#5c8a5f';
          setTimeout(() => { input.style.borderColor = 'rgba(243,239,230,0.12)'; }, 1500);
        } else {
          alert('Error: ' + data.error);
        }
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    async function buscarPorCorreo() {
      const email = document.getElementById('emailInput').value.trim();
      const resultBox = document.getElementById('emailResult');

      if (!email) {
        resultBox.innerHTML = '<div class="result-box">Ingresa un correo para buscar.</div>';
        return;
      }

      resultBox.innerHTML = '<div class="result-box">Buscando...</div>';

      try {
        const response = await fetch(`${API}/api/my-purchases?email=${encodeURIComponent(email)}`);
        const data = await response.json();

        if (!data.ok || !data.purchases || data.purchases.length === 0) {
          resultBox.innerHTML = '<div class="result-box">No se encontraron compras para este correo.</div>';
          return;
        }

        const html = data.purchases.map(p => {
          const boletas = (p.boletas || []).map(n => String(n).padStart(5, '0')).join(', ') || 'Sin asignar';
          return `
            <div class="result-box" style="margin-bottom:10px;">
              <p><strong>ID:</strong> ${p.id}</p>
              <p><strong>Nombre:</strong> ${p.nombre}</p>
              <p><strong>Ciudad:</strong> ${p.ciudad || 'No registrada'}</p>
              <p><strong>Estado:</strong> ${p.status}</p>
              <p><strong>Cantidad:</strong> ${p.cantidad}</p>
              <p><strong>Boletas:</strong> ${boletas}</p>
            </div>
          `;
        }).join('');

        resultBox.innerHTML = html;
      } catch (e) {
        resultBox.innerHTML = `<div class="result-box">Error: ${e.message}</div>`;
      }
    }

    async function buscarPorTicket() {
      const number = document.getElementById('ticketSearchInput').value.trim();
      const resultBox = document.getElementById('ticketSearchResult');

      if (!number) {
        resultBox.innerHTML = '<div class="result-box">Ingresa un número de ticket para buscar.</div>';
        return;
      }

      const ticketNum = Number(number);
      if (!Number.isInteger(ticketNum) || ticketNum < 1 || ticketNum > 100000) {
        resultBox.innerHTML = '<div class="result-box" style="color:#ff8b8b;">Número inválido (debe ser entre 1 y 100000).</div>';
        return;
      }

      if (!token) {
        resultBox.innerHTML = '<div class="result-box" style="color:#ff8b8b;">No hay sesión activa.</div>';
        return;
      }

      resultBox.innerHTML = '<div class="result-box">Buscando...</div>';

      try {
        const response = await fetch(`${API}/api/admin-search-by-ticket?number=${ticketNum}`, {
          headers: { 'x-admin-token': token }
        });
        const data = await response.json();

        if (!data.ok || !data.purchases || data.purchases.length === 0) {
          resultBox.innerHTML = `<div class="result-box">No se encontraron compras para el ticket <strong>${String(ticketNum).padStart(5, '0')}</strong>.</div>`;
          return;
        }

        const html = data.purchases.map(p => {
          const boletas = (p.boletas || []).map(n => String(n).padStart(5, '0')).join(', ') || 'Sin asignar';
          const manualNums = (p.ticketMode === 'manual' || p.ticketMode === 'visual') && p.manualNumbers && p.manualNumbers.length
            ? p.manualNumbers.map(n => String(n).padStart(5, '0')).join(', ')
            : 'N/A';

          return `
            <div class="result-box" style="margin-bottom:10px;">
              <p><strong>ID:</strong> ${p.id}</p>
              <p><strong>Nombre:</strong> ${p.nombre}</p>
              <p><strong>Cédula:</strong> ${p.cedula}</p>
              <p><strong>Teléfono:</strong> ${p.celular}</p>
              <p><strong>Correo:</strong> ${p.email}</p>
              <p><strong>Ciudad:</strong> ${p.ciudad || 'No registrada'}</p>
              <p><strong>Cantidad:</strong> ${p.cantidad} números</p>
              <p><strong>Estado:</strong> ${p.status === 'confirmed' ? '✓ Confirmada' : '⏳ Pendiente'}</p>
              <p><strong>Números asignados:</strong> ${boletas}</p>
              ${(p.ticketMode === 'manual' || p.ticketMode === 'visual')
                ? `<p><strong>Números solicitados:</strong> ${manualNums}</p>`
                : ''
              }
            </div>
          `;
        }).join('');

        resultBox.innerHTML = html;
      } catch (e) {
        resultBox.innerHTML = `<div class="result-box">Error: ${e.message}</div>`;
      }
    }

    window.addEventListener('load', function() {
      const savedToken = localStorage.getItem('token');
      const savedUser = localStorage.getItem('adminUser') || 'admin';

      if (savedToken) {
        token = savedToken;
        document.getElementById('userDisplay').textContent = savedUser;
        document.getElementById('adminArea').style.display = 'block';
        document.getElementById('loginSection').style.display = 'none';
        loadPurchases();
      }
    });
  </script>
</body>
</html>11
